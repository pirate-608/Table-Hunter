name: Release Extension Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package Extension
        run: |
          mkdir -p dist
          cd src
          zip -r ../dist/table-hunter.zip . \
            -x "*.git*" "node_modules/*" "test/*"
          
          # Verify zip was created
          if [ ! -f ../dist/table-hunter.zip ]; then
            echo "::error::Failed to create zip package"
            exit 1
          fi
          echo "✓ Created table-hunter.zip ($(du -h ../dist/table-hunter.zip | cut -f1))"

      - name: Install crx3 npm tool
        run: npm install -g crx3

      - name: Write CRX private key to file
        run: |
          cat > crx-private-key.pem <<EOF
          ${{ secrets.CRX_PRIVATE_KEY }}
          EOF
          chmod 600 crx-private-key.pem
          ls -l crx-private-key.pem
          cat crx-private-key.pem

      - name: Generate CRX
        run: |
          crx3 pack src --key-path crx-private-key.pem --out dist/table-hunter.crx
          
          # Verify CRX was created
          if [ ! -f dist/table-hunter.crx ]; then
            echo "::error::Failed to create CRX package"
            exit 1
          fi
          echo "✓ Created table-hunter.crx ($(du -h dist/table-hunter.crx | cut -f1))"

      - name: Cleanup private key
        if: always()
        run: |
          rm -f crx-private-key.pem
          echo "✓ Cleaned up private key file"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Table Hunter - ${{ github.ref_name }}"
          body: |
            ## Table Hunter Extension Release
            
            可供开发人员模式下加载的 Edge 扩展包
            
            ### Files
            - `table-hunter.crx` - CRX extension package
            - `table-hunter.zip` - ZIP extension package
            
            ### Installation
            1. Download the extension package
            2. Open Edge and navigate to `edge://extensions/`
            3. Enable "Developer mode"
            4. Click "Load unpacked" and select the extracted folder
            files: |
              dist/table-hunter.crx
              dist/table-hunter.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}