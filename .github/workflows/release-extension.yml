name: Release Extension Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package Extension
        run: |
          mkdir -p dist
          cd src
          zip -r ../dist/table-hunter.zip . \
            -x "*.git*" "node_modules/*" "test/*"

      - name: Install crx3 npm tool
        run: npm install -g crx3

      - name: Write CRX private key to file
        run: echo "${{ secrets.CRX_PRIVATE_KEY }}" > crx-private-key.pem

      - name: Generate CRX
        run: crx3 pack src --key-path crx-private-key.pem --out dist/table-hunter.crx

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Table Hunter - ${{ github.ref_name }}"
          body: "可供开发人员模式下加载的 Edge 扩展包"
          files: dist/table-hunter.crx
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
