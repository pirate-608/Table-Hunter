name: Release Extension Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package Extension
        run: |
          mkdir -p dist
          cd src
          zip -r ../dist/extension.zip . \
            -x "*.git*" "node_modules/*" "test/*"

      - name: Install crx npm tool
        run: npm install -g crx

      - name: Generate CRX
        run: crx pack -o dist/extension.crx src/manifest.json -k ${{ secrets.CRX_PRIVATE_KEY }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "发布扩展包 ${{ github.ref_name }}"
          body: "自动发布 Edge 扩展包"
          files: dist/extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
